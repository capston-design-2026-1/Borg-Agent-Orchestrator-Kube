apiVersion: v1
kind: Namespace
metadata:
  name: borg-comparison-workload
  labels:
    app.kubernetes.io/part-of: borg-comparison-shared-workload
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: comparison-web
  namespace: borg-comparison-workload
  labels:
    app.kubernetes.io/name: comparison-web
    app.kubernetes.io/part-of: borg-comparison-shared-workload
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: comparison-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: comparison-web
        app.kubernetes.io/part-of: borg-comparison-shared-workload
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: php-apache
          image: registry.k8s.io/hpa-example
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 700m
              memory: 384Mi
---
apiVersion: v1
kind: Service
metadata:
  name: comparison-web
  namespace: borg-comparison-workload
  labels:
    app.kubernetes.io/name: comparison-web
    app.kubernetes.io/part-of: borg-comparison-shared-workload
spec:
  selector:
    app.kubernetes.io/name: comparison-web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: comparison-load-generator
  namespace: borg-comparison-workload
  labels:
    app.kubernetes.io/name: comparison-load-generator
    app.kubernetes.io/part-of: borg-comparison-shared-workload
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: comparison-load-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: comparison-load-generator
        app.kubernetes.io/part-of: borg-comparison-shared-workload
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: load
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - while true; do wget -q -O- http://comparison-web.borg-comparison-workload.svc.cluster.local >/dev/null || true; done
          resources:
            requests:
              cpu: 40m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 96Mi
