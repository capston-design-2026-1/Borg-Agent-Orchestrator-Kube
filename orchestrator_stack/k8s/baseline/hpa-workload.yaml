apiVersion: v1
kind: Namespace
metadata:
  name: borg-baseline
  labels:
    app.kubernetes.io/part-of: borg-baseline-hpa-karpenter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-web
  namespace: borg-baseline
  labels:
    app.kubernetes.io/name: hpa-web
    app.kubernetes.io/part-of: borg-baseline-hpa-karpenter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hpa-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hpa-web
        app.kubernetes.io/part-of: borg-baseline-hpa-karpenter
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: php-apache
          image: registry.k8s.io/hpa-example
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 700m
              memory: 384Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hpa-web
  namespace: borg-baseline
  labels:
    app.kubernetes.io/name: hpa-web
    app.kubernetes.io/part-of: borg-baseline-hpa-karpenter
spec:
  selector:
    app.kubernetes.io/name: hpa-web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-web
  namespace: borg-baseline
  labels:
    app.kubernetes.io/name: hpa-web
    app.kubernetes.io/part-of: borg-baseline-hpa-karpenter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hpa-web
  minReplicas: 1
  maxReplicas: 24
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 45
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 200
          periodSeconds: 15
        - type: Pods
          value: 6
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 90
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-load-generator
  namespace: borg-baseline
  labels:
    app.kubernetes.io/name: hpa-load-generator
    app.kubernetes.io/part-of: borg-baseline-hpa-karpenter
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hpa-load-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hpa-load-generator
        app.kubernetes.io/part-of: borg-baseline-hpa-karpenter
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: load
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - while true; do wget -q -O- http://hpa-web.borg-baseline.svc.cluster.local >/dev/null || true; done
          resources:
            requests:
              cpu: 40m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 96Mi
