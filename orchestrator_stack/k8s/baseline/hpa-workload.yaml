apiVersion: v1
kind: Namespace
metadata:
  name: borg-comparison-workload
  labels:
    app.kubernetes.io/part-of: borg-comparison-shared-workload
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: comparison-web
  namespace: borg-comparison-workload
  labels:
    app.kubernetes.io/name: comparison-web
    app.kubernetes.io/part-of: borg-baseline-hpa-karpenter
    borg.local/baseline-controller: hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: comparison-web
  minReplicas: 1
  maxReplicas: 24
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 45
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 200
          periodSeconds: 15
        - type: Pods
          value: 6
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 90
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
