apiVersion: apps/v1
kind: Deployment
metadata:
  name: karpenter-surge
  namespace: borg-baseline
  labels:
    app.kubernetes.io/name: karpenter-surge
    app.kubernetes.io/part-of: borg-baseline-hpa-karpenter
    borg.local/needs-capacity: "true"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: karpenter-surge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karpenter-surge
        app.kubernetes.io/part-of: borg-baseline-hpa-karpenter
        borg.local/needs-capacity: "true"
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 900m
              memory: 384Mi
            limits:
              cpu: 900m
              memory: 384Mi
